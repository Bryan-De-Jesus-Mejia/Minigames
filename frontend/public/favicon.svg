<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#1a1a1a"/>
  
  <!-- Bold gamepad outline -->
  <g transform="translate(100, 100)">
    <!-- Main body - curved shape -->
    <path d="M -60 -20 Q -70 0 -60 20 L 60 20 Q 70 0 60 -20 Z" fill="none" stroke="#ffd700" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Left side - simple button -->
    <circle cx="-35" cy="0" r="6" fill="#ffd700"/>
    
    <!-- Right side - simple button -->
    <circle cx="35" cy="0" r="6" fill="#ff4d4f"/>
  </g>
</svg>